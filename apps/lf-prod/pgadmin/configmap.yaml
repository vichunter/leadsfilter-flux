apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-servers
  namespace: lf-prod
data:
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "postgres",
          "Group": "Servers",
          "Host": "postgres",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgres",
          "SSLMode": "prefer"
        },
        "2": {
          "Name": "serviceroom-postgres",
          "Group": "Servers",
          "Host": "serviceroom-postgres",
          "Port": 5432,
          "MaintenanceDB": "postgres",
          "Username": "postgres",
          "SSLMode": "prefer"
        }
      }
    }
