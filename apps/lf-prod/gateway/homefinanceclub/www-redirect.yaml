apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homefinanceclub-www-redirect
  namespace: lf-prod
spec:
  parentRefs:
    - name: homefinanceclub
  hostnames:
    - www.homefinanceclub.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            hostname: homefinanceclub.com
            statusCode: 301
