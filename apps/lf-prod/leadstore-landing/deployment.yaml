apiVersion: apps/v1
kind: Deployment
metadata:
  name: leadstore-landing
  namespace: lf-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leadstore-landing
  template:
    metadata:
      labels:
        app: leadstore-landing
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: leadsfilter-n1
      containers:
        - name: leadstore-landing
          image: nginx:1.25-alpine-slim
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
            - name: app
              mountPath: /app
      volumes:
        - name: nginx-config
          hostPath:
            path: /data/lf-prod/leadstore-landing/nginx/nginx.conf
            type: File
        - name: app
          hostPath:
            path: /data/lf-prod/leadstore-landing/app
            type: Directory
