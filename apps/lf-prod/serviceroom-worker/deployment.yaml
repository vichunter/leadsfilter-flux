apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceroom-worker
  namespace: lf-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: serviceroom-worker
  template:
    metadata:
      labels:
        app: serviceroom-worker
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: ecr-credentials-leadsfilter
      containers:
        - name: serviceroom-worker
          image: 925375122018.dkr.ecr.us-east-2.amazonaws.com/serviceroom-backend:bbf4f8a-2026-04-03.054236-prod # {"$imagepolicy": "flux-system:serviceroom-backend-prod"}
          command:
            - celery
            - --app=worker
            - worker
            - --concurrency=1
            - --hostname=worker@%h
            - --loglevel=INFO
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
          envFrom:
            - configMapRef:
                name: serviceroom-common
            - secretRef:
                name: serviceroom
