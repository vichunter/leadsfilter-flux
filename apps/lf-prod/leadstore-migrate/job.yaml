# Apply manually: kubectl apply -f apps/lf-prod/leadstore-migrate/job.yaml
# Delete after completion: kubectl delete -f apps/lf-prod/leadstore-migrate/job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: leadstore-migrate
  namespace: lf-prod
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: mcr.microsoft.com/dotnet/aspnet:8.0-bookworm-slim-arm64v8
          workingDir: /app
          command:
            - bash
            - -c
            - chmod +x efbundle && ./efbundle -- --environment Production
          envFrom:
            - configMapRef:
                name: leadstore-common
            - secretRef:
                name: leadstore
          volumeMounts:
            - name: app
              mountPath: /app
      volumes:
        - name: app
          hostPath:
            path: /data/lf-prod/migrate
            type: Directory
