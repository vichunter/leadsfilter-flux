apiVersion: v1
kind: ConfigMap
metadata:
  name: leadstore-common
  namespace: lf-prod
data:
  # Use Workstation GC instead of Server GC. Server GC allocates a heap per CPU core,
  # which wastes memory in containers. Workstation GC is more memory-efficient.
  DOTNET_GCServer: "false"
  # Aggressiveness of returning unused heap memory back to the OS (0-9).
  # 0 = default (GC keeps memory for future allocations).
  # 9 = most aggressive (returns memory immediately, higher CPU cost for GC).
  # 8 is a good balance for long-running containerized services.
  DOTNET_GCConserveMemory: "8"
  # When physical memory usage exceeds this percentage, GC becomes more aggressive
  # to avoid OOM kills. Applies to the container memory limit (cgroup-aware in .NET 5+).
  # Default is 75. Lowered to 50 to trigger more proactive collection in constrained containers.
  DOTNET_GCHighMemPercent: "50"
  TZ: "America/New_York"
  ASPNETCORE_URLS: "http://+:80"
  Logging__LogLevel__Microsoft.AspNetCore: Information
  Logging__LogLevel__Microsoft.EntityFrameworkCore: Warning
  Geocoder__Url: "http://geocoder"
  ZLenders__Url: "http://zlenders"
  Mail__Host: "smtp-relay"
  Mail__Port: "25"
  Mail__UseSsl: "false"
  Mail__FromAddress: "info@leadsfilter.com"
  Mail__FromName: "LeadsFilter"
  Mailer__Host: "smtp-relay"
  Mailer__Port: "25"
  Mailer__UseSsl: "false"
  Mailer__AdminNotificationAddresses__0: "flowlight@gmail.com"
  Mailer__AdminNotificationAddresses__1: "mihail.lebedev@gmail.com"
  AppSettings__FrontendBaseUrl: "https://leadsfilter.com/portal/"
  AppSettings__FrontendApiBaseUrl: "https://leadsfilter.com/api/"
  # --- expected in secret 'leadstore' ---
  # (placeholders; secret values override these via envFrom order)
  ConnectionStrings__StoreConnection: ""  # Host=postgres:5432;Database=leadsfilter-prod;Username=...;Password=...
  Geocoder__ApiKey: ""
  ZLenders__ApiKey: ""
  AppSettings__ServiceRoomApiKey: ""
