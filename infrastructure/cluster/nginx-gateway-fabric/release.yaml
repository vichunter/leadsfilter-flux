apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-gateway-fabric
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: nginx-gateway-fabric
      version: "2.5.1"
      sourceRef:
        kind: HelmRepository
        name: nginx-gateway-fabric
        namespace: flux-system
  targetNamespace: nginx-gateway
  install:
    createNamespace: true
  values:
    gatewayAPI:
      install: false
    nginx:
      service:
        type: ClusterIP
        patches:
          - type: StrategicMerge
            value:
              spec:
                externalIPs:
                  - "178.156.239.214"
    nginxGateway:
      gatewayClassName: nginx
