apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: vicdevcs@gmail.com
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - selector:
          dnsNames:
            - homefinanceclub.com
            - www.homefinanceclub.com
        http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: homefinanceclub
                namespace: lf-prod
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: leadsfilter
                namespace: lf-prod
