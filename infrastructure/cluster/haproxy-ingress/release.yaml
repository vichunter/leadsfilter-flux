apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: haproxy-ingress
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes-ingress
      version: ">=1.0.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: haproxytech
        namespace: flux-system
  targetNamespace: haproxy-ingress
  install:
    createNamespace: true
  values:
    controller:
      hostNetwork: true
      service:
        type: ClusterIP
