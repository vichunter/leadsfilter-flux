apiVersion: apps/v1
kind: Deployment
metadata:
  name: openvpn-udp
  namespace: openvpn
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openvpn-udp
  template:
    metadata:
      labels:
        app: openvpn-udp
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: leadsfilter-n1
      initContainers:
        - name: init-pki
          image: kylemanna/openvpn:2.4
          command:
            - sh
            - -c
            - |
              if [ ! -f /etc/openvpn/pki/ca.crt ]; then
                ovpn_genconfig \
                  -u ${SERVER_URL} \
                  -s ${VPN_SERVER_SUBNET} \
                  -d \
                  -p "route ${SERVICE_NETWORK} ${SERVICE_MASK}" \
                  -n ${DNS_IP}
                EASYRSA_BATCH=1 EASYRSA_REQ_CN="openvpn-ca" ovpn_initpki nopass
              fi
              # kylemanna/openvpn always writes port 1194 regardless of SERVER_URL
              # with hostNetwork there is no Docker port mapping, so fix it explicitly
              PORT=$(echo ${SERVER_URL} | sed 's/.*://')
              sed -i "s/^port 1194/port ${PORT}/" /etc/openvpn/openvpn.conf
              # remove redirect-gateway — we only want access to cluster, not full tunnel
              sed -i '/^push "redirect-gateway/d' /etc/openvpn/openvpn.conf
          envFrom:
            - configMapRef:
                name: openvpn-udp-env
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          volumeMounts:
            - name: pki
              mountPath: /etc/openvpn

        - name: init-iptables
          image: kylemanna/openvpn:2.4
          command:
            - sh
            - -c
            - |
              sysctl -w net.ipv4.ip_forward=1
              iptables-legacy -t nat -C POSTROUTING -s ${VPN_SUBNET} -o ${NODE_IFACE} -j MASQUERADE 2>/dev/null \
                || iptables-legacy -t nat -A POSTROUTING -s ${VPN_SUBNET} -o ${NODE_IFACE} -j MASQUERADE
          envFrom:
            - configMapRef:
                name: openvpn-udp-env
          securityContext:
            privileged: true

      containers:
        - name: openvpn-udp
          image: kylemanna/openvpn:2.4
          ports:
            - containerPort: 30094
              protocol: UDP
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          volumeMounts:
            - name: pki
              mountPath: /etc/openvpn
            - name: dev-tun
              mountPath: /dev/net/tun

      volumes:
        - name: pki
          hostPath:
            path: /data/openvpn-udp/pki
            type: DirectoryOrCreate
        - name: dev-tun
          hostPath:
            path: /dev/net/tun
