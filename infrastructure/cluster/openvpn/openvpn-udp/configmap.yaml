apiVersion: v1
kind: ConfigMap
metadata:
  name: openvpn-udp-env
  namespace: openvpn
data:
  # External IP of the VPS node
  SERVER_URL: "udp://178.156.239.214:30094"

  # VPN server subnet — must differ from TCP instance (192.168.255.0/24)
  VPN_SERVER_SUBNET: "192.168.254.0/24"

  # Service CIDR — check with: kubectl get svc -n kube-system kube-dns
  SERVICE_NETWORK: "10.96.0.0"
  SERVICE_MASK: "255.240.0.0"

  # CoreDNS ClusterIP — check with: kubectl get svc -n kube-system kube-dns
  DNS_IP: "10.96.0.10"

  # VPN client subnet assigned by OpenVPN server (matches VPN_SERVER_SUBNET)
  # DO NOT CHANGE — must match the actual subnet used by ovpn_genconfig, not a custom value
  VPN_SUBNET: "192.168.254.0/24"

  # Node network interface facing the internet
  NODE_IFACE: "eth0"
