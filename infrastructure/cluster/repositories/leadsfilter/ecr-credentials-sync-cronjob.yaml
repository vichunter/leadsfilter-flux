apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-credentials-sync-leadsfilter
  namespace: flux-system
spec:
  suspend: false
  schedule: 0 */6 * * *
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  startingDeadlineSeconds: 18000
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-credentials-sync
          restartPolicy: Never
          volumes:
            - name: token
              emptyDir:
                medium: Memory
          initContainers:
            - image: amazon/aws-cli
              name: get-token
              imagePullPolicy: IfNotPresent
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: ecr-keys
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ecr-keys
                      key: AWS_SECRET_ACCESS_KEY
              volumeMounts:
                - mountPath: /token
                  name: token
              command:
                - /bin/sh
                - -ce
                - aws ecr get-login-password --region us-east-2 > /token/ecr-token
          containers:
            - image: ghcr.io/fluxcd/flux-cli:v0.25.2
              name: create-secret
              imagePullPolicy: IfNotPresent
              env:
                - name: ECR_REGISTRY
                  value: "925375122018.dkr.ecr.us-east-2.amazonaws.com"
                - name: SECRET_NAME
                  value: "ecr-credentials-leadsfilter"
              volumeMounts:
                - mountPath: /token
                  name: token
              command:
                - /bin/sh
                - -ce
                - |-
                  kubectl create secret docker-registry $SECRET_NAME \
                    --dry-run=client \
                    --docker-server="$ECR_REGISTRY" \
                    --docker-username=AWS \
                    --docker-password="$(cat /token/ecr-token)" \
                    -o yaml | \
                  kubectl annotate --local -f - \
                    reflector.v1.k8s.emberstack.com/reflection-allowed="true" \
                    reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces="lf-prod" \
                    reflector.v1.k8s.emberstack.com/reflection-auto-enabled="true" \
                    reflector.v1.k8s.emberstack.com/reflection-auto-namespaces="lf-prod" \
                    -o yaml | kubectl apply -f -
