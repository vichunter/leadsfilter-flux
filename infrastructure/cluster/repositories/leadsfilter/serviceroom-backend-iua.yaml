apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: leadsfilter
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: master
    commit:
      author:
        name: flux
        email: ""
      messageTemplate: '{{range .Changed.Changes}}{{.OldValue}} -> {{.NewTag}}{{"\n"}}{{end}}'
    push:
      branch: master
  update:
    path: ./apps/lf-prod
    strategy: Setters
