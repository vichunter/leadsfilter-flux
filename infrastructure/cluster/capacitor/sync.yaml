apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: capacitor
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: flux-system
  sourceRef:
    kind: OCIRepository
    name: capacitor
  path: ./
  prune: true
  wait: true
  patches:
    - patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: capacitor
        spec:
          template:
            spec:
              containers:
                - name: capacitor
                  resources:
                    requests:
                      cpu: 50m
                    limits:
                      cpu: 100m
      target:
        kind: Deployment
        name: capacitor
