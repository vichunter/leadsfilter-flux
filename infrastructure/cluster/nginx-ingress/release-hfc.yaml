apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-ingress-hfc
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: ingress-nginx
      version: ">=4.0.0 <5.0.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  targetNamespace: ingress-nginx
  install:
    createNamespace: true
  values:
    controller:
      ingressClassResource:
        name: nginx-hfc
        enabled: true
        default: false
        controllerValue: "k8s.io/ingress-nginx-hfc"
      ingressClass: nginx-hfc
      electionID: ingress-nginx-hfc-leader
      admissionWebhooks:
        enabled: false
      service:
        type: ClusterIP
        externalIPs:
          - "5.161.26.66"
      config:
        use-gzip: "true"
        use-gunzip: "true"
        gzip-level: "5"
        gzip-min-length: "1000"
        gzip-types: "text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript image/svg+xml image/x-icon image/bmp"
        server-snippet: |
          more_set_headers "X-Request-Time: $request_time";
          more_set_headers "X-Upstream-Connect-Time: $upstream_connect_time";
          more_set_headers "X-Upstream-Header-Time: $upstream_header_time";
          more_set_headers "X-Upstream-Response-Time: $upstream_response_time";
          more_set_headers "X-Request-Id: $req_id";
          more_set_headers "X-Served-At: $msec";
