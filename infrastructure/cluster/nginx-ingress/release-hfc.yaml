apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-ingress-hfc
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: ingress-nginx
      version: ">=4.0.0 <5.0.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  targetNamespace: ingress-nginx
  install:
    createNamespace: true
  upgrade:
    force: true
  values:
    controller:
      hostNetwork: true
      service:
        type: ClusterIP
      updateStrategy:
        type: Recreate
      ingressClassResource:
        name: nginx-hfc
        enabled: true
        default: false
        controllerValue: "k8s.io/ingress-nginx-hfc"
      ingressClass: nginx-hfc
      electionID: ingress-nginx-hfc-leader
      config:
        bind-address: "5.161.26.66"
        use-gzip: "true"
        use-gunzip: "true"
        gzip-level: "5"
        gzip-min-length: "1000"
        gzip-types: "text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript image/svg+xml image/x-icon image/bmp"
